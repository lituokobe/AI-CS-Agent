services:
  ai-services-dev:
    profiles: ["dev"]
    build: .
    container_name: ai-services-dev
    restart: unless-stopped
    cpus: 1.5
    mem_limit: 2g
    mem_reservation: 1g
    ports:
      - "5001:5001"  # ai_gateway_service
    # 🚨 CRITICAL: Override entrypoint/command to use mounted entrypoint
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    extra_hosts: #for Linux deployment, define docker's host url
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - TZ=Asia/Shanghai
      # model service url, for ai_gateway_service use
      - AI_MODEL_SERVICE_URL=http://127.0.0.1:5002
      # Dev - if milvus, redis and embedding are deployed on the same machine:
      - MILVUS_URL=http://host.docker.internal:19530
      - REDIS_SERVER=host.docker.internal
      - EMBED_SERVICE_URL=http://host.docker.internal:8083
    cap_drop:
      - ALL # Remove ALL special root privileges from the container, even if it runs as root.
    cap_add:
      - DAC_OVERRIDE     # ← Add back: bypass file permissions
      - FOWNER           # ← Add back: modify any file's metadata
    security_opt:
        - no-new-privileges:true
    read_only: true  # read-only for docker file
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /run:size=64m,mode=755
    volumes:
      # 🎯 Mount ALL files including entrypoint.sh, Dockerfile, etc.
      - .:/app:ro
      - ./logs:/app/logs:rw
      - ./static/logs:/app/static/logs:rw
      - ./data:/app/data:rw
      - ./persistence:/app/persistence:rw
      - ./models:/app/models:rw

    working_dir: /app
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:5001/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  ai-services-prod:
    profiles: ["prod"]
    user: "1000:1000"
    build: .
    container_name: ai-services-prod
    restart: unless-stopped
    cpus: 1.5
    mem_limit: 2g
    mem_reservation: 1g
    ports:
      - "5001:5001"
    entrypoint: [ "/bin/bash", "/app/entrypoint.sh" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - TZ=Asia/Shanghai
      - AI_MODEL_SERVICE_URL=http://127.0.0.1:5002
      # Prod - milvus, redis and embedding are deployed on another machine (internal IP):
      - MILVUS_URL=http://172.29.121.236:19530
      - REDIS_SERVER=172.29.121.236
      - EMBED_SERVICE_URL=http://172.29.121.236:8083
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true  # read-only for docker file
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /run:size=64m,mode=755
    volumes:
      # 🎯 Mount ALL files including entrypoint.sh, Dockerfile, etc.
      - .:/app:ro
      - ./logs:/app/logs:rw
      - ./static/logs:/app/static/logs:rw
      - ./data:/app/data:rw
      - ./persistence:/app/persistence:rw
      - ./models:/app/models:rw

    working_dir: /app
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://127.0.0.1:5001/gateway/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s